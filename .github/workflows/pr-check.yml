name: pr-check
on:
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Install bundle (agentic from git) and standard
        run: |
          bundle install
          gem install standard --no-document
      - name: Refuse PRs that touch the generated site
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^docs/'; then
            echo "::error::PRs must not commit docs/ - the site is built and deployed by CI (pages.yml)."
            exit 1
          fi
      - name: Run acceptance gates on changed examples
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^examples/.*\.rb$' | grep -v examples_index || true)
          if [ -z "$changed" ]; then
            echo "no example changes; nothing to gate."
            exit 0
          fi
          status=0
          for f in $changed; do
            [ -f "$f" ] || continue # deleted files have no gates to pass
            bin/contribute check "$(basename "$f")" || status=1
          done
          exit $status
      - name: Index freshness
        run: |
          bundle exec ruby examples/examples_index.rb
          git diff --exit-code examples/README.md || {
            echo "::error::examples/README.md is stale - run: bundle exec ruby examples/examples_index.rb"; exit 1; }
